name: expenses-dev-postgres

services:
  postgres:
    image: pgvector/pgvector:pg15
    container_name: expenses_db_dev
    environment:
      POSTGRES_DB: expensesdb
      POSTGRES_USER: expenses
      POSTGRES_PASSWORD: expenses
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U expenses -d expensesdb"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M
    volumes:
      - expense_categorizer_dev_data:/var/lib/postgresql/data

  redis:
    image: redis:alpine
    container_name: expenses_redis_dev
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  celery-beat:
    build: .
    container_name: expense_categorizer_celery_beat_dev
    # Use a specific schedule file to avoid lock issues
    command: celery -A server beat -l info --schedule /app/beat-schedule/celerybeat-schedule
    env_file:
      - .env
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_PASSWORD=expenses
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M
    volumes:
      - celerybeat_schedule:/app/beat-schedule

  celery-worker:
    build: .
    container_name: expenses_celery_worker_dev
    command: celery -A server worker -l info
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_PASSWORD=expenses
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - DJANGO_SETTINGS_MODULE=server.settings
      - FASTEMBED_CACHE_PATH=/app/model_cache
      - EMAIL_HOST=mailhog
      - EMAIL_PORT=1025
    volumes:
      - fastembed_models:/app/model_cache
    restart: unless-stopped

  mailhog:
    image: mailhog/mailhog
    container_name: expenses_mailhog_dev
    ports:
      - "1025:1025" # SMTP server
      - "8025:8025" # Web UI
    restart: unless-stopped

  manager:
    build: .
    container_name: expenses_manager_dev
    profiles:
      - manual
    command: ${MANAGER_COMMAND}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - DJANGO_SETTINGS_MODULE=server.settings
      - FASTEMBED_CACHE_PATH=/app/model_cache

volumes:
  expense_categorizer_dev_data:
  redis_data:
  fastembed_models:
  celerybeat_schedule: