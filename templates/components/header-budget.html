{% extends "components/header.html" %}

{% block header_extra_title %}
    <div class="header-total-pill header-budget-total-pill" id="budget-total-pill">
        <span class="label">Totale Pianificato</span>
        <span class="value">€ {{ total_planned|floatformat:2|default:"0,00" }}</span>
    </div>
{% endblock %}

{% block header_content %}
    <div class="header-budget-content">
        {% if next_month %}
            <button class="btn btn-primary btn-sm d-flex align-items-center gap-1"
                    hx-post="{% url 'budget_copy' year=next_month.year month=next_month.month %}"
                    hx-target="#budget-list-container"
                    hx-indicator=".htmx-progress"
                    hx-confirm="Sei sicuro di voler copiare il budget dal mese scorso? Tutti i cambiamenti manuali correnti verranno sovrascritti.">
                <span class="material-icons" style="font-size: 1.1rem;">content_copy</span>
                Copia da mese scorso
            </button>
            <button class="btn btn-primary btn-sm d-flex align-items-center gap-1"
                    hx-post="{% url 'budget_reset' year=next_month.year month=next_month.month %}"
                    hx-target="#budget-list-container"
                    hx-indicator=".htmx-progress"
                    hx-confirm="Sei sicuro di voler ricalcolare il budget? Tutti i cambiamenti manuali verranno persi.">
                <span class="material-icons" style="font-size: 1.1rem;">refresh</span>
                Ricalcola
            </button>
        {% endif %}
    </div>
{% endblock %}
