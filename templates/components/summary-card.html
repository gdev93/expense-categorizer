<div class="summary-card">
    {% if icon %}<div class="card-icon material-icons">{{ icon }}</div>{% endif %}
    <div class="card-content">
        {% if label %}<h3>{{ label }}</h3>{% endif %}
        {% if value is not None %}
            <p class="card-value">
                {% if value == 0 or value == "0.00" %}
                    —
                {% else %}
                    {{ currency }}{{ value }}
                {% endif %}
            </p>
        {% endif %}
        {% if subtext %}<span class="card-change {{ change_class }}">{{ subtext }}</span>{% endif %}
    </div>
</div>
