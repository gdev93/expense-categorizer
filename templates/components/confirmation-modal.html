<div id="confirmation-modal" class="app-modal">
    <div class="app-modal-content">
        <button type="button" class="close-btn" id="confirm-close-btn" aria-label="Chiudi">
            <span class="material-icons">close</span>
        </button>
        <div class="app-modal-header">
            <h3><span class="material-icons" id="confirm-icon">help_outline</span> <span id="confirm-title">Conferma</span></h3>
        </div>
        <div class="app-modal-body" id="confirm-body">
            Sei sicuro di voler procedere?
        </div>
        <div class="app-modal-footer">
            <button class="btn btn-secondary" id="confirm-cancel-btn">Annulla</button>
            <button class="btn btn-primary" id="confirm-proceed-btn">Conferma</button>
        </div>
    </div>
</div>
